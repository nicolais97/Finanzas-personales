<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finanzas"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1e1e1e;--bd:#2a2a2a;--ac:#c8f135;--tx:#f0f0f0;--tx2:#888;--red:#ff5e5e;--pur:#b48fff;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.hdr{padding:52px 20px 16px;flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.app-nm{font-size:11px;letter-spacing:.12em;color:var(--tx2);text-transform:uppercase;font-weight:500}
.mes-bg{font-size:11px;letter-spacing:.1em;color:var(--ac);text-transform:uppercase;font-weight:600;background:rgba(200,241,53,.1);padding:4px 10px;border-radius:20px}
.bal-lbl{font-size:11px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.bal-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-.02em}
.bal-big span{color:var(--ac)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px 16px;flex-shrink:0}
.sc{background:var(--sf);border-radius:var(--r);padding:12px 14px;border:.5px solid var(--bd)}
.slbl{font-size:10px;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.sval{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.g{color:var(--ac)}.r{color:var(--red)}.p{color:var(--pur)}
.tabs{display:flex;padding:0 20px 0;flex-shrink:0;border-bottom:.5px solid var(--bd)}
.tab{flex:1;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:10px 0;text-align:center;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;font-weight:600;transition:all .2s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.cnt{flex:1;overflow-y:auto;padding:16px 20px 120px;-webkit-overflow-scrolling:touch}
.stl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-bottom:12px;font-weight:600}
.bw{margin-bottom:10px}
.bt{display:flex;justify-content:space-between;margin-bottom:5px}
.bn{font-size:12px;color:var(--tx)}
.ba{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx2)}
.btr{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px;background:var(--ac);transition:width .6s}
.mi{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:.5px solid var(--bd)}
.mi:last-child{border-bottom:none}
.mico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.minf{flex:1;min-width:0}
.mds{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mmt{font-size:11px;color:var(--tx2);margin-top:2px}
.mam{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;white-space:nowrap}
.box{background:var(--sf);border:.5px solid var(--bd);border-radius:20px;padding:16px;margin-bottom:14px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pu 2s infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.iat{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ac);font-weight:600}
.fld{width:100%;background:var(--sf2);border:.5px solid var(--bd);border-radius:var(--r);padding:11px 14px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;resize:none}
.fld::placeholder{color:var(--tx2)}
.fld:focus{border-color:var(--ac)}
.fld option{background:var(--sf)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn{width:100%;padding:13px;background:var(--ac);color:#0a0a0a;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.btn:active{opacity:.75}
.flbl{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border:.5px dashed var(--bd);border-radius:var(--r);font-size:12px;color:var(--tx2);cursor:pointer;letter-spacing:.05em;text-transform:uppercase;margin:8px 0}
.pvbox{background:var(--sf2);border:.5px solid var(--ac);border-radius:var(--r);padding:14px;margin-top:12px}
.pvbtns{display:flex;gap:8px;margin-top:12px}
.pvbtns button{flex:1;padding:10px;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;text-transform:uppercase}
.frow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{font-size:11px;padding:5px 12px;border-radius:20px;border:.5px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.05em;white-space:nowrap}
.chip.on{background:var(--ac);color:#0a0a0a;border-color:var(--ac)}
.empty{text-align:center;padding:40px 20px;color:var(--tx2);font-size:13px}
.fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ac);color:#0a0a0a;border:none;border-radius:30px;padding:15px 28px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;z-index:200;box-shadow:0 4px 24px rgba(200,241,53,.2)}
.fab:active{opacity:.8;transform:translateX(-50%) scale(.97)}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ovl.on{opacity:1;pointer-events:all}
.sht{background:var(--sf);border-radius:24px 24px 0 0;padding:20px 20px 44px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.ovl.on .sht{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 20px}
.dvd{border-top:.5px solid var(--bd);padding-top:16px;margin-top:8px}
.ld{font-size:12px;color:var(--tx2);text-align:center;padding:10px 0;letter-spacing:.06em;text-transform:uppercase;display:none}
.tst{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ac);color:#0a0a0a;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.tst.on{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="app-nm">Mis Finanzas</div>
    <div class="mes-bg" id="mesBadge"></div>
  </div>
  <div class="bal-lbl">Ahorro neto del mes</div>
  <div class="bal-big" id="balBig"><span>$</span>0</div>
</div>

<div class="stats">
  <div class="sc"><div class="slbl">Ingresé</div><div class="sval g" id="stIng">$0</div></div>
  <div class="sc"><div class="slbl">Gasté</div><div class="sval r" id="stGas">$0</div></div>
  <div class="sc"><div class="slbl">Invertí</div><div class="sval p" id="stInv">$0</div></div>
</div>

<div class="tabs" id="tabs">
  <div class="tab on" onclick="goPage('resumen')">Resumen</div>
  <div class="tab" onclick="goPage('historial')">Historial</div>
  <div class="tab" onclick="goPage('reportes')">Reportes</div>
  <div class="tab" onclick="goPage('recurrentes')">Auto</div>
</div>

<div class="cnt" id="cnt"></div>

<button class="fab" onclick="openSheet()">＋ Agregar</button>

<div class="ovl" id="ovl" onclick="ovlClick(event)">
  <div class="sht">
    <div class="hdl"></div>
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <div class="dot"></div><div class="iat">Registrar con IA</div>
    </div>
    <textarea class="fld" id="aiTxt" rows="2" placeholder='Ej: "gasté $1500 en el super", "cobré $200000"'></textarea>
    <button class="btn" onclick="doAI()">Procesar con IA</button>
    <label class="flbl" for="imgF">📷 Foto de ticket</label>
    <input type="file" id="imgF" accept="image/*" style="display:none" onchange="doImg(this)"/>
    <div class="ld" id="ldAI">Procesando...</div>
    <div id="pvDiv"></div>
    <div class="dvd">
      <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-weight:600;margin-bottom:12px">Manual</div>
      <div class="g2">
        <input class="fld" id="mDsc" placeholder="Descripción"/>
        <input class="fld" type="number" id="mMnt" placeholder="Monto"/>
      </div>
      <div class="g2">
        <select class="fld" id="mTip"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option><option value="inversión">Inversión</option></select>
        <select class="fld" id="mCat"><option>Comida</option><option>Transporte</option><option>Salud</option><option>Ocio</option><option>Inversiones</option><option>Otros</option></select>
      </div>
      <button class="btn" onclick="doManual()">Guardar</button>
    </div>
  </div>
</div>

<div class="tst" id="tst"></div>

<script>
var CATS=['Comida','Transporte','Salud','Ocio','Inversiones','Otros'];
var EMJ={Comida:'🍔',Transporte:'🚌',Salud:'💊',Ocio:'🎮',Inversiones:'📈',Otros:'📦'};
var CBG={Comida:'rgba(255,94,94,.15)',Transporte:'rgba(96,180,255,.15)',Salud:'rgba(200,241,53,.15)',Ocio:'rgba(180,143,255,.15)',Inversiones:'rgba(180,143,255,.15)',Otros:'rgba(136,136,136,.15)'};
var MNS=['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Oct','Nov','Dic'];
var AKEY='';
var PRXY='https://blue-night-9012finanzas-proxy.npaesky.workers.dev';
var SYS='Sos asistente de finanzas argentinas. Extraé del texto: desc (2-4 palabras), monto (numero positivo), tipo ("gasto","ingreso" o "inversión"), cat (Comida/Transporte/Salud/Ocio/Inversiones/Otros). Responde SOLO JSON. Ej: {"desc":"Almuerzo","monto":800,"tipo":"gasto","cat":"Comida"}';

var DB=[];
try{var _s=localStorage.getItem('fin_v5');if(_s)DB=JSON.parse(_s);}catch(e){}
function save(){try{localStorage.setItem('fin_v5',JSON.stringify(DB));}catch(e){}}
function fmt(n){return '$'+Math.round(Math.abs(n)).toLocaleString('es-AR');}
function hoy(){return new Date().toISOString().split('T')[0];}
function mesAct(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function toast(msg){var t=document.getElementById('tst');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2200);}

var pg='resumen';
var fl={tipo:'',cat:''};

function goPage(name){
  pg=name;
  var ts=document.querySelectorAll('#tabs .tab');
  ['resumen','historial','reportes','recurrentes'].forEach(function(n,i){ts[i].classList.toggle('on',n===name);});
  render();
}

function updHdr(){
  var d=new Date();
  document.getElementById('mesBadge').textContent=MNS[d.getMonth()]+' '+d.getFullYear();
  var m=mesAct();
  var its=DB.filter(function(x){return x.fecha.startsWith(m);});
  var ing=0,gas=0,inv=0;
  its.forEach(function(i){if(i.tipo==='ingreso')ing+=i.monto;else if(i.tipo==='inversión')inv+=i.monto;else gas+=i.monto;});
  var ah=ing-gas-inv;
  document.getElementById('balBig').innerHTML='<span>$</span>'+Math.round(Math.abs(ah)).toLocaleString('es-AR');
  document.getElementById('balBig').style.color=ah>=0?'var(--tx)':'var(--red)';
  document.getElementById('stIng').textContent=fmt(ing);
  document.getElementById('stGas').textContent=fmt(gas);
  document.getElementById('stInv').textContent=fmt(inv);
}

function mRow(i, idx){
  var isI=i.tipo==='ingreso',isV=i.tipo==='inversión';
  var em=isI?'💰':isV?'📈':(EMJ[i.cat]||'📦');
  var bg=isI?'rgba(200,241,53,.15)':isV?'rgba(180,143,255,.15)':(CBG[i.cat]||CBG['Otros']);
  var cl=isI?'var(--ac)':isV?'var(--pur)':'var(--red)';
  var sg=isI?'+':isV?'':'−';
  var lb=isI?'Ingreso':isV?'Inversión':i.cat;
  var delBtn = idx !== undefined ? '<button onclick="delMov('+idx+')" style="background:transparent;border:none;color:var(--tx2);font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0;line-height:1" title="Borrar">🗑</button>' : '';
  return '<div class="mi"><div class="mico" style="background:'+bg+'">'+em+'</div><div class="minf"><div class="mds">'+i.desc+'</div><div class="mmt">'+lb+' · '+i.fecha+'</div></div><div style="display:flex;align-items:center;gap:6px"><div class="mam" style="color:'+cl+'">'+sg+fmt(i.monto)+'</div>'+delBtn+'</div></div>';
}

function delMov(idx){
  if(!confirm('¿Borrar este movimiento?')) return;
  DB.splice(idx, 1);
  save();
  render();
}

function render(){
  updHdr();
  var c=document.getElementById('cnt');
  if(pg==='resumen') c.innerHTML=pgRes();
  if(pg==='historial') c.innerHTML=pgHist();
  if(pg==='reportes') c.innerHTML=pgRep();
  if(pg==='recurrentes') c.innerHTML=pgRec();
}

function pgRes(){
  var m=mesAct();
  var its=DB.filter(function(x){return x.fecha.startsWith(m);});
  var tots={};CATS.forEach(function(c){tots[c]=0;});
  its.filter(function(i){return i.tipo!=='ingreso';}).forEach(function(i){tots[i.cat]=(tots[i.cat]||0)+i.monto;});
  var mx=Math.max.apply(null,Object.values(tots).concat([1]));
  var bars=CATS.map(function(c){
    return '<div class="bw"><div class="bt"><span class="bn">'+EMJ[c]+' '+c+'</span><span class="ba">'+fmt(tots[c])+'</span></div><div class="btr"><div class="bf" style="width:'+Math.round(tots[c]/mx*100)+'%"></div></div></div>';
  }).join('');
  var rec=DB.slice().reverse().slice(0,6);
  var movs=rec.length?rec.map(function(item){ var realIdx=DB.indexOf(item); return mRow(item,realIdx); }).join(''):'<div class="empty">Sin movimientos aún</div>';
  return '<div class="stl">Gastos del mes</div>'+bars+'<div class="stl" style="margin-top:24px">Últimos movimientos</div>'+movs;
}

function pgHist(){
  var tt=['','gasto','ingreso','inversión'];
  var tl=['Todos','Gastos','Ingresos','Inversiones'];
  var tc=tt.map(function(v,i){return '<button class="chip'+(fl.tipo===v?' on':'')+'" onclick="setFl(\'tipo\',\''+v+'\')">'+tl[i]+'</button>';}).join('');
  var cs=[''].concat(CATS);
  var cc=cs.map(function(v){return '<button class="chip'+(fl.cat===v?' on':'')+'" onclick="setFl(\'cat\',\''+v+'\')">'+( v||'Todas')+'</button>';}).join('');
  var its=DB.slice().reverse();
  if(fl.tipo)its=its.filter(function(i){return i.tipo===fl.tipo;});
  if(fl.cat)its=its.filter(function(i){return i.cat===fl.cat;});
  return '<div class="frow">'+tc+'</div><div class="frow">'+cc+'</div>'+(its.length?its.map(function(item){ var realIdx=DB.indexOf(item); return mRow(item,realIdx); }).join(''):'<div class="empty">Sin resultados</div>');
}

function setFl(k,v){fl[k]=v;render();}

function pgRep(){
  var ms=[];var seen={};
  DB.forEach(function(i){var m=i.fecha.substring(0,7);if(!seen[m]){seen[m]=1;ms.push(m);}});
  ms.sort().reverse();
  var opts=ms.map(function(m){var p=m.split('-');return '<option value="'+m+'">'+MNS[parseInt(p[1])-1]+' '+p[0]+'</option>';}).join('');
  return '<div class="box"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-weight:600;margin-bottom:12px">Seleccionar periodo</div>'+
    '<select class="fld" id="rpMd" onchange="rpChg()" style="margin-bottom:10px"><option value="">-- Elegir --</option>'+opts+'<option value="custom">Periodo personalizado</option></select>'+
    '<div id="rpCst" style="display:none"><div class="g2">'+
      '<div><div style="font-size:11px;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Desde</div><input class="fld" type="date" id="rpDsd"/></div>'+
      '<div><div style="font-size:11px;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Hasta</div><input class="fld" type="date" id="rpHst"/></div>'+
    '</div></div>'+
    '<button class="btn" onclick="genRep()">Ver reporte</button></div>'+
    '<div id="rpRes"></div>';
}

function rpChg(){
  var v=document.getElementById('rpMd').value;
  var el=document.getElementById('rpCst');
  if(el)el.style.display=v==='custom'?'':'none';
}

function genRep(){
  var md=document.getElementById('rpMd').value;
  if(!md){toast('Elegí un mes o periodo');return;}
  var its=[],tit='';
  if(md==='custom'){
    var ds=document.getElementById('rpDsd').value,hs=document.getElementById('rpHst').value;
    if(!ds||!hs){toast('Elegí fechas');return;}
    its=DB.filter(function(i){return i.fecha>=ds&&i.fecha<=hs;});
    tit='Del '+ds+' al '+hs;
  } else {
    its=DB.filter(function(i){return i.fecha.startsWith(md);});
    var p=md.split('-');tit=MNS[parseInt(p[1])-1]+' '+p[0];
  }
  var ing=0,gas=0,inv=0,cats={};
  CATS.forEach(function(c){cats[c]=0;});
  its.forEach(function(i){
    if(i.tipo==='ingreso')ing+=i.monto;
    else if(i.tipo==='inversión')inv+=i.monto;
    else{gas+=i.monto;cats[i.cat]=(cats[i.cat]||0)+i.monto;}
  });
  var ah=ing-gas-inv,ac=ah>=0?'var(--ac)':'var(--red)';
  var mx=Math.max.apply(null,Object.values(cats).concat([1]));
  var bars=gas>0?CATS.map(function(c){
    var pt=gas>0?Math.round(cats[c]/gas*100):0;
    return '<div class="bw"><div class="bt"><span class="bn">'+EMJ[c]+' '+c+'</span><span class="ba">'+fmt(cats[c])+' <span style="font-size:10px;color:var(--tx2)">('+pt+'%)</span></span></div><div class="btr"><div class="bf" style="width:'+Math.round(cats[c]/mx*100)+'%"></div></div></div>';
  }).join(''):'';
  var mvs=its.length?its.slice().reverse().map(function(item){ var realIdx=DB.indexOf(item); return mRow(item,realIdx); }).join(''):'<div class="empty">Sin movimientos</div>';
  var el=document.getElementById('rpRes');
  if(el)el.innerHTML=
    '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:12px;font-weight:600">'+tit+'</div>'+
    '<div class="box" style="margin-bottom:12px"><div class="slbl">Ahorro neto</div><div style="font-family:DM Mono,monospace;font-size:32px;font-weight:700;margin-top:4px;color:'+ac+'">'+fmt(ah)+'</div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
      '<div class="sc"><div class="slbl">Ingresé</div><div class="sval g">'+fmt(ing)+'</div></div>'+
      '<div class="sc"><div class="slbl">Gasté</div><div class="sval r">'+fmt(gas)+'</div></div>'+
      '<div class="sc"><div class="slbl">Invertí</div><div class="sval p">'+fmt(inv)+'</div></div>'+
      '<div class="sc"><div class="slbl">Movimientos</div><div class="sval" style="color:var(--tx)">'+its.length+'</div></div>'+
    '</div>'+
    (gas>0?'<div class="box" style="margin-bottom:12px"><div class="stl" style="margin-bottom:12px">Desglose de gastos</div>'+bars+'</div>':'')+
    '<div class="box"><div class="stl" style="margin-bottom:12px">Movimientos</div>'+mvs+'</div>';
}

function openSheet(){
  document.getElementById('ovl').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('ovl').classList.remove('on');
  document.body.style.overflow='';
  document.getElementById('pvDiv').innerHTML='';
  document.getElementById('aiTxt').value='';
  document.getElementById('mDsc').value='';
  document.getElementById('mMnt').value='';
  document.getElementById('ldAI').style.display='none';
}
function ovlClick(e){if(e.target===document.getElementById('ovl'))closeSheet();}

async function callAI(msgs){
  var r=await fetch(PRXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:SYS,messages:msgs})});
  var d=await r.json();
  var t=(d.content||[]).map(function(x){return x.text||'';}).join('');
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

async function doAI(){
  var v=document.getElementById('aiTxt').value.trim();if(!v)return;
  document.getElementById('ldAI').style.display='block';
  document.getElementById('pvDiv').innerHTML='';
  try{var res=await callAI([{role:'user',content:v}]);showPv(res);}
  catch(e){toast('Error: '+e.message);}
  document.getElementById('ldAI').style.display='none';
}

async function doImg(input){
  var file=input.files[0];if(!file)return;
  document.getElementById('ldAI').style.display='block';
  var reader=new FileReader();
  reader.onload=async function(e){
    var b64=e.target.result.split(',')[1];
    try{
      var r=await fetch(PRXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:SYS,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Extraé datos del ticket'}]}]})});
      var d=await r.json();
      var t=(d.content||[]).map(function(x){return x.text||'';}).join('');
      showPv(JSON.parse(t.replace(/```json|```/g,'').trim()));
    }catch(e){toast('Error leyendo ticket: '+e.message);}
    document.getElementById('ldAI').style.display='none';
  };
  reader.readAsDataURL(file);
}

function showPv(res){
  var enc=encodeURIComponent(JSON.stringify(res));
  document.getElementById('pvDiv').innerHTML=
    '<div class="pvbox"><div style="display:flex;justify-content:space-between;align-items:center">'+
      '<div><div style="font-size:14px;font-weight:700">'+res.desc+'</div><div style="font-size:11px;color:var(--tx2);margin-top:3px">'+res.tipo+' · '+res.cat+'</div></div>'+
      '<div style="font-family:DM Mono,monospace;font-size:20px;font-weight:500;color:var(--ac)">'+fmt(res.monto)+'</div>'+
    '</div><div class="pvbtns">'+
      '<button style="background:var(--ac);color:#0a0a0a" onclick="confAdd(\''+enc+'\')">Confirmar</button>'+
      '<button style="background:var(--sf);color:var(--tx);border:.5px solid var(--bd)" onclick="document.getElementById(\'pvDiv\').innerHTML=\'\'">Cancelar</button>'+
    '</div></div>';
}

function confAdd(enc){
  var res=JSON.parse(decodeURIComponent(enc));
  DB.push({desc:res.desc,monto:res.monto,tipo:res.tipo,cat:res.cat,fecha:hoy()});
  save();toast('Guardado ✓');closeSheet();render();
}

function doManual(){
  var desc=document.getElementById('mDsc').value.trim();
  var monto=parseFloat(document.getElementById('mMnt').value);
  var tipo=document.getElementById('mTip').value;
  var cat=document.getElementById('mCat').value;
  if(!desc||!monto){toast('Completá descripción y monto');return;}
  DB.push({desc:desc,monto:monto,tipo:tipo,cat:cat,fecha:hoy()});
  save();toast('Guardado ✓');closeSheet();render();
}


// RECURRENTES
var REC=[];
try{var _r=localStorage.getItem('fin_rec');if(_r)REC=JSON.parse(_r);}catch(e){}
function saveRec(){try{localStorage.setItem('fin_rec',JSON.stringify(REC));}catch(e){}}

function checkRecurrentes(){
  var hoyStr=hoy();
  var d=new Date();
  var diaSemana=d.getDay(); // 0=dom,1=lun...
  var diaMes=d.getDate();
  REC.forEach(function(r,ri){
    var debe=false;
    if(r.frec==='diaria') debe=true;
    if(r.frec==='semanal' && diaSemana===parseInt(r.diaS||1)) debe=true;
    if(r.frec==='mensual' && diaMes===parseInt(r.diaM||1)) debe=true;
    if(debe){
      // check if already registered today
      var yaReg=DB.some(function(x){ return x.recId===ri && x.fecha===hoyStr; });
      if(!yaReg){
        DB.push({desc:r.desc,monto:r.monto,tipo:r.tipo,cat:r.cat,fecha:hoyStr,recId:ri});
        save();
      }
    }
  });
}

function pgRec(){
  var freqLabel={diaria:'Diaria',semanal:'Semanal',mensual:'Mensual'};
  var dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var lista=REC.length?REC.map(function(r,i){
    var fl=freqLabel[r.frec]||r.frec;
    var extra='';
    if(r.frec==='semanal') extra=' · '+dias[parseInt(r.diaS||1)];
    if(r.frec==='mensual') extra=' · día '+r.diaM;
    var isI=r.tipo==='ingreso',isV=r.tipo==='inversión';
    var cl=isI?'var(--ac)':isV?'var(--pur)':'var(--red)';
    var sg=isI?'+':isV?'':'−';
    return '<div class="mi">'+
      '<div class="mico" style="background:var(--sf2)">🔄</div>'+
      '<div class="minf"><div class="mds">'+r.desc+'</div><div class="mmt">'+fl+extra+' · '+r.cat+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
        '<div class="mam" style="color:'+cl+'">'+sg+fmt(r.monto)+'</div>'+
        '<button onclick="delRec('+i+')" style="background:transparent;border:none;color:var(--tx2);font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0">🗑</button>'+
      '</div></div>';
  }).join('') : '<div class="empty">Sin cargas automáticas</div>';

  return '<div class="box" style="margin-bottom:14px">'+
    '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-weight:600;margin-bottom:14px">Nueva carga automática</div>'+
    '<div class="g2">'+
      '<input class="fld" id="rDsc" placeholder="Descripción"/>'+
      '<input class="fld" type="number" id="rMnt" placeholder="Monto"/>'+
    '</div>'+
    '<div class="g2">'+
      '<select class="fld" id="rTip"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option><option value="inversión">Inversión</option></select>'+
      '<select class="fld" id="rCat"><option>Comida</option><option>Transporte</option><option>Salud</option><option>Ocio</option><option>Inversiones</option><option>Otros</option></select>'+
    '</div>'+
    '<select class="fld" id="rFrq" onchange="recFrecChg()" style="margin-bottom:8px">'+
      '<option value="diaria">Diaria — se registra todos los días</option>'+
      '<option value="semanal">Semanal — elegí el día</option>'+
      '<option value="mensual">Mensual — elegí el día del mes</option>'+
    '</select>'+
    '<div id="rExtra"></div>'+
    '<button class="btn" onclick="addRec()">Guardar carga automática</button>'+
    '</div>'+
    '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-weight:600;margin-bottom:12px">Configuradas</div>'+
    lista;
}

function recFrecChg(){
  var v=document.getElementById('rFrq').value;
  var el=document.getElementById('rExtra');
  if(!el) return;
  if(v==='semanal'){
    el.innerHTML='<select class="fld" id="rDiaS" style="margin-bottom:8px"><option value="1">Lunes</option><option value="2">Martes</option><option value="3">Miércoles</option><option value="4">Jueves</option><option value="5">Viernes</option><option value="6">Sábado</option><option value="0">Domingo</option></select>';
  } else if(v==='mensual'){
    var opts='';for(var i=1;i<=31;i++) opts+='<option value="'+i+'">Día '+i+'</option>';
    el.innerHTML='<select class="fld" id="rDiaM" style="margin-bottom:8px">'+opts+'</select>';
  } else {
    el.innerHTML='';
  }
}

function addRec(){
  var desc=document.getElementById('rDsc').value.trim();
  var monto=parseFloat(document.getElementById('rMnt').value);
  var tipo=document.getElementById('rTip').value;
  var cat=document.getElementById('rCat').value;
  var frec=document.getElementById('rFrq').value;
  if(!desc||!monto){toast('Completá descripción y monto');return;}
  var r={desc:desc,monto:monto,tipo:tipo,cat:cat,frec:frec};
  if(frec==='semanal'){var ds=document.getElementById('rDiaS');r.diaS=ds?ds.value:'1';}
  if(frec==='mensual'){var dm=document.getElementById('rDiaM');r.diaM=dm?dm.value:'1';}
  REC.push(r);
  saveRec();
  // register today if applies
  checkRecurrentes();
  toast('Guardado ✓');
  render();
}

function delRec(i){
  if(!confirm('¿Borrar esta carga automática?')) return;
  REC.splice(i,1);
  saveRec();
  render();
}

checkRecurrentes();
render();
</script>
