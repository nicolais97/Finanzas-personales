<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finanzas"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --accent:#c8f135;
  --accent-dim:#8faa23;
  --text:#f0f0f0;
  --text2:#888;
  --red:#ff5e5e;
  --green:#c8f135;
  --blue:#60b4ff;
  --purple:#b48fff;
  --r:14px;
  --r2:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
.header{padding:52px 20px 16px;position:relative;flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.app-name{font-size:11px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;font-weight:500}
.mes-badge{font-size:11px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;font-weight:600;background:rgba(200,241,53,.1);padding:4px 10px;border-radius:20px}
.balance-label{font-size:11px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.balance-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--text)}
.balance-big span{color:var(--accent)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px 16px;flex-shrink:0}
.stat-card{background:var(--surface);border-radius:var(--r);padding:12px 14px;border:0.5px solid var(--border)}
.stat-card .slbl{font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.stat-card .sval{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.sval.g{color:var(--green)}
.sval.r{color:var(--red)}
.sval.p{color:var(--purple)}

/* TABS */
.tabs{display:flex;gap:0;padding:0 20px 14px;flex-shrink:0}
.tab{flex:1;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 0;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid var(--border);transition:all .2s;font-weight:600}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* SCROLL CONTENT */
.content{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch}

/* BARS */
.section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;font-weight:600}
.bar-wrap{margin-bottom:10px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:5px}
.bar-name{font-size:12px;color:var(--text)}
.bar-amt{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}
.bar-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* MOVIMIENTOS */
.mov-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:.5px solid var(--border)}
.mov-item:last-child{border-bottom:none}
.mov-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mov-info{flex:1;min-width:0}
.mov-desc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mov-meta{font-size:11px;color:var(--text2);margin-top:2px}
.mov-amt{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;white-space:nowrap}

/* AGREGAR */
.add-section{margin-bottom:20px}
.ia-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.ia-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ia-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ia-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600}
textarea.field{width:100%;background:var(--surface2);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;resize:none;outline:none;line-height:1.5}
textarea.field::placeholder{color:var(--text2)}
textarea.field:focus{border-color:var(--accent)}
.field-row{display:grid;gap:8px;margin-bottom:8px}
.field-row.two{grid-template-columns:1fr 1fr}
input.field,select.field{width:100%;background:var(--surface2);border:.5px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;-webkit-appearance:none}
input.field::placeholder{color:var(--text2)}
input.field:focus,select.field:focus{border-color:var(--accent)}
select.field option{background:var(--surface)}
.btn-main{width:100%;padding:14px;background:var(--accent);color:#0a0a0a;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn-main:active{opacity:.75}
.btn-sec{width:100%;padding:13px;background:transparent;color:var(--text);border:.5px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-sec:active{background:var(--surface2)}
.file-label{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:transparent;border:.5px dashed var(--border);border-radius:var(--r);font-size:12px;color:var(--text2);cursor:pointer;letter-spacing:.05em;text-transform:uppercase}
.preview-box{background:var(--surface2);border:.5px solid var(--accent);border-radius:var(--r);padding:14px;margin-top:12px}
.preview-row{display:flex;justify-content:space-between;align-items:center}
.preview-desc{font-size:14px;font-weight:700}
.preview-meta{font-size:11px;color:var(--text2);margin-top:3px}
.preview-amt{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--accent)}
.preview-btns{display:flex;gap:8px;margin-top:12px}
.preview-btns button{flex:1;padding:10px;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none}
.btn-confirm{background:var(--accent);color:#0a0a0a}
.btn-cancel{background:var(--surface);color:var(--text);border:.5px solid var(--border) !important;border:none}
.loading-text{font-size:12px;color:var(--text2);text-align:center;padding:10px 0;letter-spacing:.06em;text-transform:uppercase}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0a0a;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 0}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:600;transition:color .2s}
.nav-item.active .nav-lbl{color:var(--accent)}

/* FILTERS */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{font-size:11px;padding:5px 12px;border-radius:20px;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.05em;white-space:nowrap}
.filter-chip.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px;letter-spacing:.05em}

/* FAB */
.fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0a0a;border:none;border-radius:30px;padding:16px 32px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(200,241,53,.25);transition:transform .15s,opacity .15s}
.fab:active{transform:translateX(-50%) scale(0.96);opacity:.85}
.fab-icon{font-size:20px;line-height:1}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:16px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-name">Mis Finanzas</div>
    <div class="mes-badge" id="mesBadge"></div>
  </div>
  <div class="balance-label">Ahorro neto</div>
  <div class="balance-big" id="balanceBig"><span>$</span>0</div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="slbl">Ingresé</div><div class="sval g" id="stIng">$0</div></div>
  <div class="stat-card"><div class="slbl">Gasté</div><div class="sval r" id="stGas">$0</div></div>
  <div class="stat-card"><div class="slbl">Invertí</div><div class="sval p" id="stInv">$0</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="goPage('resumen')">Resumen</div>
  <div class="tab" onclick="goPage('movimientos')">Historial</div>
  <div class="tab" onclick="goPage('reportes')">Reportes</div>
  <div class="tab" onclick="goPage('agregar')">+ Nuevo</div>
</div>

<div class="content" id="mainContent"></div>

<button class="fab" onclick="openModal()"><span class="fab-icon">＋</span> Agregar</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Registrar movimiento</div>
    <div class="ia-box" style="margin-bottom:12px">
      <div class="ia-header"><div class="ia-dot"></div><div class="ia-title">Escribí en lenguaje natural</div></div>
      <textarea class="field" id="modalAiField" rows="2" placeholder='Ej: "gasté $1500 en el super", "cobré sueldo $200000"'></textarea>
      <button class="btn-main" style="margin-top:8px" onclick="modalDoAI()">Procesar con IA</button>
    </div>
    <label class="file-label" for="modalImgFile" style="margin-bottom:12px;display:flex">📷 &nbsp;Foto de ticket</label>
    <input type="file" id="modalImgFile" accept="image/*" style="display:none" onchange="modalDoImg(this)"/>
    <div class="loading-text" id="modalLoading" style="display:none">Procesando...</div>
    <div id="modalPreview"></div>
    <div style="border-top:.5px solid var(--border);padding-top:14px;margin-top:8px">
      <div class="modal-title">Manual</div>
      <div class="field-row two" style="margin-bottom:8px">
        <input class="field" id="modalDesc" placeholder="Descripción"/>
        <input class="field" type="number" id="modalMonto" placeholder="Monto"/>
      </div>
      <div class="field-row two" style="margin-bottom:10px">
        <select class="field" id="modalTipo"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option><option value="inversión">Inversión</option></select>
        <select class="field" id="modalCat"><option>Comida</option><option>Transporte</option><option>Salud</option><option>Ocio</option><option>Inversiones</option><option>Otros</option></select>
      </div>
      <button class="btn-main" onclick="modalDoManual()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS=['Comida','Transporte','Salud','Ocio','Inversiones','Otros'];
const CAT_EMOJI={Comida:'🍔',Transporte:'🚌',Salud:'💊',Ocio:'🎮',Inversiones:'📈',Otros:'📦',Ingreso:'💰',Inversión:'📈'};
const CAT_BG={Comida:'rgba(255,94,94,.15)',Transporte:'rgba(96,180,255,.15)',Salud:'rgba(200,241,53,.15)',Ocio:'rgba(180,143,255,.15)',Inversiones:'rgba(180,143,255,.15)',Otros:'rgba(136,136,136,.15)',Ingreso:'rgba(200,241,53,.15)',Inversión:'rgba(180,143,255,.15)'};
const MONTHS=['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Oct','Nov','Dic'];

let DB=[];
try{const s=localStorage.getItem('fin_app_v2');if(s)DB=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('fin_app_v2',JSON.stringify(DB));}catch(e){}}
function fmt(n){return '$'+Math.round(Math.abs(n)).toLocaleString('es-AR');}
function today(){return new Date().toISOString().split('T')[0];}
function curMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

let curPage='resumen';
let movFilter={tipo:'',cat:''};

function goPage(name){
  curPage=name;
  document.querySelectorAll('.tabs .tab').forEach((el,i)=>{
    el.classList.toggle('active',['resumen','movimientos','agregar'][i]===name);
  });
  
function getAvailableMonths(){
  const set=new Set();
  DB.forEach(i=>{ const m=i.fecha.substring(0,7); set.add(m); });
  const arr=Array.from(set).sort().reverse();
  return arr;
}

function renderReportesHTML(){
  const months=getAvailableMonths();
  const opts=months.map(m=>{
    const [y,mo]=m.split('-');
    const label=MONTHS[parseInt(mo)-1]+' '+y;
    return '<option value="'+m+'">'+label+'</option>';
  }).join('');
  const periodoOpts='<option value="custom">Periodo personalizado</option>'+opts;
  
  return `<div style="padding-bottom:20px">
    <div class="ia-box" style="margin-bottom:14px">
      <div class="modal-title" style="margin-bottom:12px">Seleccionar periodo</div>
      <select class="field" id="repMode" onchange="repModeChange()" style="margin-bottom:10px">
        <option value="">-- Elegir mes --</option>
        ${opts}
        <option value="custom">Periodo personalizado</option>
      </select>
      <div id="repCustom" style="display:none">
        <div class="field-row two" style="margin-bottom:8px">
          <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase">Desde</div><input class="field" type="date" id="repFrom"/></div>
          <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase">Hasta</div><input class="field" type="date" id="repTo"/></div>
        </div>
      </div>
      <button class="btn-main" onclick="generarReporte()">Ver reporte</button>
    </div>
    <div id="repResult"></div>
  </div>`;
}

function repModeChange(){
  const v=document.getElementById('repMode').value;
  document.getElementById('repCustom').style.display=v==='custom'?'':'none';
}

function renderReportes(){
  document.getElementById('mainContent').innerHTML=renderReportesHTML();
}

function generarReporte(){
  const mode=document.getElementById('repMode').value;
  if(!mode){showToast('Elegí un mes o periodo');return;}
  
  let items=[];
  let titulo='';
  
  if(mode==='custom'){
    const from=document.getElementById('repFrom').value;
    const to=document.getElementById('repTo').value;
    if(!from||!to){showToast('Elegí fecha de inicio y fin');return;}
    items=DB.filter(i=>i.fecha>=from&&i.fecha<=to);
    titulo='Del '+from+' al '+to;
  } else {
    items=DB.filter(i=>i.fecha.startsWith(mode));
    const [y,mo]=mode.split('-');
    titulo=MONTHS[parseInt(mo)-1]+' '+y;
  }
  
  let ing=0,gas=0,inv=0;
  const cats={};
  CATS.forEach(c=>{cats[c]=0;});
  items.forEach(i=>{
    if(i.tipo==='ingreso') ing+=i.monto;
    else if(i.tipo==='inversión') inv+=i.monto;
    else { gas+=i.monto; cats[i.cat]=(cats[i.cat]||0)+i.monto; }
  });
  const ahorro=ing-gas-inv;
  const ahorroColor=ahorro>=0?'var(--green)':'var(--red)';
  const mx=Math.max(...Object.values(cats),1);
  
  const bars=CATS.map(c=>{
    const pct=Math.round(cats[c]/mx*100);
    const pctTotal=gas>0?Math.round(cats[c]/gas*100):0;
    return `<div class="bar-wrap">
      <div class="bar-top"><span class="bar-name">${CAT_EMOJI[c]} ${c}</span><span class="bar-amt">${fmt(cats[c])} <span style="font-size:10px;color:var(--text2)">(${pctTotal}%)</span></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const movList=items.length?[...items].reverse().map(movHtml).join(''):'<div class="empty-state">Sin movimientos en este periodo</div>';
  
  document.getElementById('repResult').innerHTML=`
    <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;font-weight:600">${titulo}</div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="stat-card" style="grid-column:1/-1">
        <div class="slbl">Ahorro neto del periodo</div>
        <div style="font-family:'DM Mono',monospace;font-size:32px;font-weight:700;color:${ahorroColor}">${fmt(ahorro)}</div>
      </div>
      <div class="stat-card"><div class="slbl">Ingresé</div><div class="sval g">${fmt(ing)}</div></div>
      <div class="stat-card"><div class="slbl">Gasté</div><div class="sval r">${fmt(gas)}</div></div>
      <div class="stat-card"><div class="slbl">Invertí</div><div class="sval p">${fmt(inv)}</div></div>
      <div class="stat-card"><div class="slbl">Movimientos</div><div class="sval" style="color:var(--text)">${items.length}</div></div>
    </div>

    ${gas>0?`<div class="ia-box" style="margin-bottom:12px">
      <div class="modal-title" style="margin-bottom:12px">Desglose de gastos</div>
      ${bars}
    </div>`:''}

    <div class="ia-box">
      <div class="modal-title" style="margin-bottom:12px">Todos los movimientos</div>
      ${movList}
    </div>`;
}

render();
}

function updateHeader(){
  const d=new Date();
  document.getElementById('mesBadge').textContent=MONTHS[d.getMonth()]+' '+d.getFullYear();
  const m=curMonth();
  const items=DB.filter(x=>x.fecha.startsWith(m));
  let ing=0,gas=0,inv=0;
  items.forEach(i=>{if(i.tipo==='ingreso')ing+=i.monto;else if(i.tipo==='inversión')inv+=i.monto;else gas+=i.monto;});
  const ahorro=ing-gas-inv;
  document.getElementById('balanceBig').innerHTML='<span>$</span>'+Math.round(Math.abs(ahorro)).toLocaleString('es-AR');
  document.getElementById('balanceBig').style.color=ahorro>=0?'var(--text)':'var(--red)';
  document.getElementById('stIng').textContent=fmt(ing);
  document.getElementById('stGas').textContent=fmt(gas);
  document.getElementById('stInv').textContent=fmt(inv);
}

function render(){
  updateHeader();
  const c=document.getElementById('mainContent');
  if(curPage==='resumen') c.innerHTML=renderResumen();
  if(curPage==='movimientos') c.innerHTML=renderMovimientos();
  if(curPage==='agregar') c.innerHTML=renderAgregar();
  if(curPage==='reportes') c.innerHTML=renderReportesHTML();
  attachEvents();
}

function renderResumen(){
  const m=curMonth();
  const items=DB.filter(x=>x.fecha.startsWith(m));
  const tots={};CATS.forEach(c=>tots[c]=0);
  items.filter(i=>i.tipo!=='ingreso').forEach(i=>{tots[i.cat]=(tots[i.cat]||0)+i.monto;});
  const mx=Math.max(...Object.values(tots),1);
  const bars=CATS.map(c=>`
    <div class="bar-wrap">
      <div class="bar-top"><span class="bar-name">${CAT_EMOJI[c]} ${c}</span><span class="bar-amt">${fmt(tots[c])}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(tots[c]/mx*100)}%"></div></div>
    </div>`).join('');

  const recent=[...DB].reverse().slice(0,8);
  const movs=recent.length?recent.map(movHtml).join(''):`<div class="empty-state">Sin movimientos aún</div>`;

  return `<div class="section-title" style="margin-bottom:14px">Gastos del mes</div>${bars}
    <div class="section-title" style="margin-top:24px;margin-bottom:0">Últimos movimientos</div>
    ${movs}`;
}

function movHtml(i){
  const isIng=i.tipo==='ingreso';
  const isInv=i.tipo==='inversión';
  const emoji=isIng?CAT_EMOJI['Ingreso']:isInv?CAT_EMOJI['Inversión']:(CAT_EMOJI[i.cat]||'📦');
  const bg=isIng?CAT_BG['Ingreso']:isInv?CAT_BG['Inversión']:(CAT_BG[i.cat]||CAT_BG['Otros']);
  const amtColor=isIng?'var(--green)':isInv?'var(--purple)':'var(--red)';
  const sign=isIng?'+':isInv?'':'−';
  const label=isIng?'Ingreso':isInv?'Inversión':i.cat;
  return `<div class="mov-item">
    <div class="mov-icon" style="background:${bg}">${emoji}</div>
    <div class="mov-info">
      <div class="mov-desc">${i.desc}</div>
      <div class="mov-meta">${label} · ${i.fecha}</div>
    </div>
    <div class="mov-amt" style="color:${amtColor}">${sign}${fmt(i.monto)}</div>
  </div>`;
}

function renderMovimientos(){
  const chips_tipo=['','gasto','ingreso','inversión'];
  const labels_tipo=['Todos','Gastos','Ingresos','Inversiones'];
  const tipoChips=chips_tipo.map((v,i)=>`<button class="filter-chip ${movFilter.tipo===v?'active':''}" onclick="setFilter('tipo','${v}')">${labels_tipo[i]}</button>`).join('');
  const catChips=['','Comida','Transporte','Salud','Ocio','Inversiones','Otros'].map(v=>`<button class="filter-chip ${movFilter.cat===v?'active':''}" onclick="setFilter('cat','${v}')">${v||'Todas'}</button>`).join('');

  let items=[...DB].reverse();
  if(movFilter.tipo) items=items.filter(i=>i.tipo===movFilter.tipo);
  if(movFilter.cat) items=items.filter(i=>i.cat===movFilter.cat);
  const list=items.length?items.map(movHtml).join(''):`<div class="empty-state">Sin resultados</div>`;
  return `<div class="filter-row">${tipoChips}</div><div class="filter-row">${catChips}</div>${list}`;
}

function renderAgregar(){
  return `<div class="add-section">
    <div class="ia-box">
      <div class="ia-header"><div class="ia-dot"></div><div class="ia-title">Registrar con IA</div></div>
      <textarea class="field" id="aiField" rows="3" placeholder="Ej: gasté $1500 en el super, cobré sueldo $200000, taxi $800..."></textarea>
      <div style="margin-top:8px">
        <button class="btn-main" onclick="doAI()" style="margin-bottom:8px">Procesar con IA</button>
        <label class="file-label" for="imgFile">📷 Foto de ticket</label>
        <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="doImg(this)"/>
      </div>
      <div class="loading-text" id="loadingAI" style="display:none">Procesando...</div>
      <div id="previewDiv"></div>
    </div>

    <div class="ia-box">
      <div class="ia-header"><div class="ia-title" style="color:var(--text2)">Manual</div></div>
      <div class="field-row"><input class="field" id="mDesc" placeholder="Descripción"/></div>
      <div class="field-row two">
        <input class="field" type="number" id="mMonto" placeholder="Monto"/>
        <select class="field" id="mTipo">
          <option value="gasto">Gasto</option>
          <option value="ingreso">Ingreso</option>
          <option value="inversión">Inversión</option>
        </select>
      </div>
      <div class="field-row" style="margin-bottom:12px">
        <select class="field" id="mCat">
          <option>Comida</option><option>Transporte</option><option>Salud</option>
          <option>Ocio</option><option>Inversiones</option><option>Otros</option>
        </select>
      </div>
      <button class="btn-main" onclick="doManual()">Guardar</button>
    </div>
  </div>`;
}

function attachEvents(){}

function setFilter(key,val){
  movFilter[key]=val;
  render();
}

const SYS=`Sos un asistente de finanzas argentinas. Del texto extraé: desc (descripción corta 2-4 palabras), monto (número positivo, sin símbolo), tipo ("gasto","ingreso" o "inversión"), cat (Comida/Transporte/Salud/Ocio/Inversiones/Otros — si es ingreso pone Otros). Respondé SOLO JSON válido sin markdown. Ej: {"desc":"Almuerzo trabajo","monto":800,"tipo":"gasto","cat":"Comida"}`;

async function callAI(messages){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:SYS,messages})});
  const d=await r.json();
  const t=(d.content||[]).map(x=>x.text||'').join('');
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

async function doAI(){
  const v=document.getElementById('aiField').value.trim();if(!v)return;
  document.getElementById('loadingAI').style.display='block';
  document.getElementById('previewDiv').innerHTML='';
  try{const res=await callAI([{role:'user',content:v}]);showPreview(res);}
  catch(e){showToast('Error. Intentá de nuevo.');}
  document.getElementById('loadingAI').style.display='none';
}

async function doImg(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('loadingAI').style.display='block';
  document.getElementById('previewDiv').innerHTML='';
  const reader=new FileReader();
  reader.onload=async function(e){
    const b64=e.target.result.split(',')[1];
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:SYS,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Extraé los datos del ticket'}]}]})});
      const d=await r.json();
      const t=(d.content||[]).map(x=>x.text||'').join('');
      showPreview(JSON.parse(t.replace(/```json|```/g,'').trim()));
    }catch(e){showToast('No pude leer el ticket.');}
    document.getElementById('loadingAI').style.display='none';
  };
  reader.readAsDataURL(file);
}

function showPreview(res){
  const emoji=res.tipo==='ingreso'?'💰':res.tipo==='inversión'?'📈':(CAT_EMOJI[res.cat]||'📦');
  const enc=encodeURIComponent(JSON.stringify(res));
  document.getElementById('previewDiv').innerHTML=`<div class="preview-box">
    <div class="preview-row">
      <div><div class="preview-desc">${emoji} ${res.desc}</div><div class="preview-meta">${res.tipo} · ${res.cat}</div></div>
      <div class="preview-amt">${fmt(res.monto)}</div>
    </div>
    <div class="preview-btns">
      <button class="btn-confirm" onclick="confirmAdd('${enc}')">Confirmar</button>
      <button class="btn-cancel" style="background:var(--surface);color:var(--text);border:.5px solid var(--border)" onclick="document.getElementById('previewDiv').innerHTML=''">Cancelar</button>
    </div>
  </div>`;
}

function confirmAdd(enc){
  const res=JSON.parse(decodeURIComponent(enc));
  DB.push({...res,fecha:today()});save();
  document.getElementById('aiField').value='';
  document.getElementById('previewDiv').innerHTML='';
  showToast('Guardado ✓');
  render();
}

function doManual(){
  const desc=document.getElementById('mDesc').value.trim();
  const monto=parseFloat(document.getElementById('mMonto').value);
  const tipo=document.getElementById('mTipo').value;
  const cat=document.getElementById('mCat').value;
  if(!desc||!monto){showToast('Completá descripción y monto');return;}
  DB.push({desc,monto,tipo,cat,fecha:today()});save();
  showToast('Guardado ✓');
  goPage('resumen');
}

render();
function openModal(){document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';document.getElementById('modalPreview').innerHTML='';document.getElementById('modalAiField').value='';document.getElementById('modalDesc').value='';document.getElementById('modalMonto').value='';}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
async function modalDoAI(){var v=document.getElementById('modalAiField').value.trim();if(!v)return;document.getElementById('modalLoading').style.display='block';document.getElementById('modalPreview').innerHTML='';try{var res=await callAI([{role:'user',content:v}]);showModalPreview(res);}catch(e){showToast('Error.');}document.getElementById('modalLoading').style.display='none';}

function showModalPreview(res){var enc=encodeURIComponent(JSON.stringify(res));document.getElementById('modalPreview').innerHTML='<div class="preview-box" style="margin-bottom:12px"><div class="preview-row"><div><div class="preview-desc">'+res.desc+'</div><div class="preview-meta">'+res.tipo+' - '+res.cat+'</div></div><div class="preview-amt">'+fmt(res.monto)+'</div></div><div class="preview-btns"><button class="btn-confirm" onclick="modalConfirmAdd(\''+enc+'\')">Confirmar</button><button style="background:var(--surface);color:var(--text);border:.5px solid var(--border);flex:1;padding:10px;border-radius:var(--r);font-family:Syne,sans-serif;font-size:12px;font-weight:700;cursor:pointer" onclick="document.getElementById(\'modalPreview\').innerHTML=\'\'">Cancelar</button></div></div>';}
function modalConfirmAdd(enc){var res=JSON.parse(decodeURIComponent(enc));DB.push(Object.assign({},res,{fecha:today()}));save();showToast('Guardado');closeModal();render();}
function modalDoManual(){var desc=document.getElementById('modalDesc').value.trim();var monto=parseFloat(document.getElementById('modalMonto').value);var tipo=document.getElementById('modalTipo').value;var cat=document.getElementById('modalCat').value;if(!desc||!monto){showToast('Completa descripcion y monto');return;}DB.push({desc:desc,monto:monto,tipo:tipo,cat:cat,fecha:today()});save();showToast('Guardado');closeModal();render();}

</script>
